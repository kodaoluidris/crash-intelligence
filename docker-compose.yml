services:
  db:
    image: postgres:16-alpine
    container_name: crash_reports_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: crash_reports
      POSTGRES_USER: crash
      POSTGRES_PASSWORD: crash_secret
    ports:
      - "5433:5432"
    volumes:
      - crash_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crash -d crash_reports"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  crash_pgdata:
